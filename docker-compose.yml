version: '3.8'

services:
  # Web Server (Nginx)
  web:
    image: nginx:alpine
    ports:
      - "8030:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel_network

  # PHP App Server
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./:/var/www/html
    networks:
      - laravel_network

  # Database MySQL
  db:
    image: mysql:8.0
    environment:
      # Password dan Info DB dibuat sangat jelas di sini
      MYSQL_DATABASE: 'db_coding_web'
      MYSQL_ROOT_PASSWORD: 'password_root_rahasia'
      MYSQL_USER: 'user_coding'
      MYSQL_PASSWORD: 'password_db_jelas'
    volumes:
      - db_data:/var/lib/mysql
      # Volume ini akan otomatis mengimport dataset Anda
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    networks:
      - laravel_network

networks:
  laravel_network:
    driver: bridge

volumes:
  db_data:
